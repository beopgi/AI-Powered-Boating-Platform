<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#495057"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1971c2"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#e03131"/>
    </marker>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #212529; }
      .node { fill: #f1f3f5; stroke: #868e96; stroke-width: 2; rx: 10; ry: 10; }
      .terminal { fill: #dee2e6; stroke: #868e96; stroke-width: 2; rx: 25; ry: 25; }
      .decision { fill: #f8f9fa; stroke: #868e96; stroke-width: 2; }
      .text { font: 600 24px Arial, sans-serif; fill: #343a40; }
      .service { fill: #f8f0fc; stroke: #9c36b5; stroke-width: 1.8; rx: 8; ry: 8; }
      .serviceTitle { font: 700 22px Arial, sans-serif; fill: #5f3dc4; }
      .yes { font: 700 18px Arial, sans-serif; fill: #1971c2; }
      .no { font: 700 18px Arial, sans-serif; fill: #e03131; }
      .arrow { stroke: #495057; stroke-width: 2.5; fill: none; marker-end: url(#arrowGray); }
      .arrowYes { stroke: #1971c2; stroke-width: 2.8; fill: none; marker-end: url(#arrowBlue); }
      .arrowNo { stroke: #e03131; stroke-width: 2.8; fill: none; marker-end: url(#arrowRed); }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="#ececec"/>
  <text x="60" y="70" class="title">AI-Powered Boating Platform Flowchart</text>

  <!-- Main flow nodes -->
  <rect class="terminal" x="70" y="130" width="200" height="60"/>
  <text class="text" x="170" y="168" text-anchor="middle">앱 실행</text>

  <rect class="node" x="70" y="240" width="220" height="64"/>
  <text class="text" x="180" y="280" text-anchor="middle">로그인/온보딩</text>

  <polygon class="decision" points="410,240 500,272 410,304 320,272"/>
  <text class="text" x="410" y="278" text-anchor="middle">위치 권한?</text>

  <rect class="node" x="560" y="240" width="200" height="64"/>
  <text class="text" x="660" y="280" text-anchor="middle">홈 진입</text>

  <polygon class="decision" points="900,240 990,272 900,304 810,272"/>
  <text class="text" x="900" y="278" text-anchor="middle">개인화 충분?</text>

  <rect class="node" x="1060" y="170" width="260" height="64"/>
  <text class="text" x="1190" y="210" text-anchor="middle">AI 추천 콘텐츠</text>

  <rect class="node" x="1060" y="310" width="260" height="64"/>
  <text class="text" x="1190" y="350" text-anchor="middle">인기 콘텐츠</text>

  <rect class="node" x="1380" y="240" width="260" height="64"/>
  <text class="text" x="1510" y="280" text-anchor="middle">지도/이벤트 탐색</text>

  <polygon class="decision" points="1740,240 1830,272 1740,304 1650,272"/>
  <text class="text" x="1740" y="278" text-anchor="middle">항해 시작?</text>

  <!-- sailing branch -->
  <rect class="node" x="1540" y="380" width="230" height="58"/>
  <text class="text" x="1655" y="417" text-anchor="middle">실시간 트래킹</text>

  <rect class="node" x="1540" y="460" width="230" height="58"/>
  <text class="text" x="1655" y="497" text-anchor="middle">항해 로그 저장</text>

  <rect class="node" x="1540" y="540" width="230" height="58"/>
  <text class="text" x="1655" y="577" text-anchor="middle">리포트 생성</text>

  <!-- reservation branch -->
  <rect class="node" x="1360" y="680" width="230" height="58"/>
  <text class="text" x="1475" y="717" text-anchor="middle">이벤트 상세</text>

  <polygon class="decision" points="1730,680 1820,709 1730,738 1640,709"/>
  <text class="text" x="1730" y="715" text-anchor="middle">좌석 가용?</text>

  <rect class="node" x="1360" y="790" width="230" height="58"/>
  <text class="text" x="1475" y="827" text-anchor="middle">예약 요청</text>

  <rect class="node" x="1640" y="790" width="230" height="58"/>
  <text class="text" x="1755" y="827" text-anchor="middle">결제 시도</text>

  <polygon class="decision" points="1730,890 1820,919 1730,948 1640,919"/>
  <text class="text" x="1730" y="925" text-anchor="middle">결제 성공?</text>

  <rect class="node" x="1360" y="900" width="230" height="58"/>
  <text class="text" x="1475" y="937" text-anchor="middle">예약 확정/바우처</text>

  <rect class="terminal" x="980" y="960" width="300" height="64"/>
  <text class="text" x="1130" y="1000" text-anchor="middle">푸시 알림 후 홈 복귀</text>

  <!-- service block -->
  <rect x="130" y="620" width="1120" height="350" fill="none" stroke="#adb5bd" stroke-width="2"/>
  <text x="160" y="655" class="serviceTitle">Platform Services</text>

  <rect class="service" x="160" y="690" width="200" height="56"/><text class="text" x="260" y="726" text-anchor="middle">API Gateway</text>
  <rect class="service" x="390" y="690" width="140" height="56"/><text class="text" x="460" y="726" text-anchor="middle">Auth</text>
  <rect class="service" x="560" y="690" width="220" height="56"/><text class="text" x="670" y="726" text-anchor="middle">Recommendation</text>
  <rect class="service" x="810" y="690" width="170" height="56"/><text class="text" x="895" y="726" text-anchor="middle">Map/POI</text>

  <rect class="service" x="160" y="780" width="180" height="56"/><text class="text" x="250" y="816" text-anchor="middle">Sailing Log</text>
  <rect class="service" x="370" y="780" width="190" height="56"/><text class="text" x="465" y="816" text-anchor="middle">Reservation</text>
  <rect class="service" x="590" y="780" width="150" height="56"/><text class="text" x="665" y="816" text-anchor="middle">Payment</text>
  <rect class="service" x="770" y="780" width="220" height="56"/><text class="text" x="880" y="816" text-anchor="middle">Notification</text>

  <!-- arrows main -->
  <path class="arrow" d="M170 190 L180 240"/>
  <path class="arrow" d="M290 272 L320 272"/>

  <path class="arrowYes" d="M500 272 L560 272"/>
  <text class="yes" x="525" y="255">YES</text>

  <path class="arrowNo" d="M410 304 L410 360 L180 360 L180 304"/>
  <text class="no" x="330" y="350">NO (권한 안내 후 재시도)</text>

  <path class="arrow" d="M760 272 L810 272"/>
  <path class="arrowYes" d="M990 272 L1060 202"/>
  <text class="yes" x="1005" y="230">YES</text>
  <path class="arrowNo" d="M990 272 L1060 342"/>
  <text class="no" x="1008" y="328">NO</text>

  <path class="arrow" d="M1320 202 L1380 272"/>
  <path class="arrow" d="M1320 342 L1380 272"/>
  <path class="arrow" d="M1640 272 L1650 272"/>

  <!-- branch: sailing -->
  <path class="arrowYes" d="M1740 304 L1740 350 L1655 350 L1655 380"/>
  <text class="yes" x="1752" y="338">YES</text>
  <path class="arrow" d="M1655 438 L1655 460"/>
  <path class="arrow" d="M1655 518 L1655 540"/>
  <path class="arrow" d="M1540 569 L1475 569 L1475 680"/>

  <!-- branch: reservation -->
  <path class="arrowNo" d="M1740 304 L1740 650 L1475 650 L1475 680"/>
  <text class="no" x="1752" y="640">NO</text>

  <path class="arrow" d="M1590 709 L1640 709"/>
  <path class="arrowNo" d="M1730 738 L1730 770 L1475 770 L1475 680"/>
  <text class="no" x="1744" y="766">NO (대체 시간)</text>
  <path class="arrowYes" d="M1730 738 L1730 790"/>
  <text class="yes" x="1744" y="778">YES</text>

  <path class="arrow" d="M1590 819 L1640 819"/>
  <path class="arrow" d="M1755 848 L1755 890"/>

  <path class="arrowNo" d="M1730 948 L1870 948 L1870 819 L1755 819"/>
  <text class="no" x="1840" y="935">NO (결제 재시도)</text>

  <path class="arrowYes" d="M1640 919 L1590 919"/>
  <text class="yes" x="1602" y="904">YES</text>
  <path class="arrow" d="M1360 929 L1130 929 L1130 960"/>
  <path class="arrow" d="M1130 960 L1130 920 L660 920 L660 304"/>

  <!-- service mapping arrows -->
  <path class="arrowYes" d="M660 304 L660 690 L260 690"/>
  <path class="arrowYes" d="M260 746 L250 780"/>
  <path class="arrowYes" d="M260 746 L460 746 L460 780"/>
  <path class="arrowYes" d="M260 746 L665 746 L665 780"/>
  <path class="arrowYes" d="M260 746 L895 746 L895 690"/>
  <text class="yes" x="670" y="675">API 호출</text>
</svg>
