<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
    <marker id="arrowYes" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2b8a3e"/>
    </marker>
    <marker id="arrowNo" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c92a2a"/>
    </marker>
    <marker id="arrowRetry" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e67700"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill:#111; }
      .label { font: 700 18px Arial, sans-serif; fill:#111; }
      .small { font: 16px Arial, sans-serif; fill:#222; }
      .box { stroke-width:2.5; rx:14; ry:14; }
      .line { stroke:#495057; stroke-width:2.5; marker-end:url(#arrow); fill:none; }
      .yes { stroke:#2b8a3e; stroke-width:3; marker-end:url(#arrowYes); fill:none; }
      .no { stroke:#c92a2a; stroke-width:3; marker-end:url(#arrowNo); fill:none; }
      .retry { stroke:#e67700; stroke-width:3; stroke-dasharray:10 8; marker-end:url(#arrowRetry); fill:none; }
      .yesText { font: 700 16px Arial, sans-serif; fill:#2b8a3e; }
      .noText { font: 700 16px Arial, sans-serif; fill:#c92a2a; }
      .retryText { font: 700 16px Arial, sans-serif; fill:#e67700; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#f8f9fa"/>
  <text x="800" y="55" class="title" text-anchor="middle">AI-Powered Boating Platform - Flowchart Architecture</text>

  <!-- start + intake -->
  <rect class="box" x="90" y="210" width="230" height="95" fill="#e7f5ff" stroke="#1c7ed6"/>
  <text x="205" y="255" class="label" text-anchor="middle">Mobile App Request</text>
  <text x="205" y="282" class="small" text-anchor="middle">Home / Map / Booking / Log</text>

  <rect class="box" x="390" y="210" width="260" height="95" fill="#fff4e6" stroke="#f08c00"/>
  <text x="520" y="255" class="label" text-anchor="middle">API Gateway / BFF</text>
  <text x="520" y="282" class="small" text-anchor="middle">Routing + Rate Limit</text>

  <!-- decision 1 -->
  <polygon points="820,190 940,260 820,330 700,260" fill="#fff3bf" stroke="#f08c00" stroke-width="3"/>
  <text x="820" y="250" class="label" text-anchor="middle">Auth Valid?</text>
  <text x="820" y="277" class="small" text-anchor="middle">JWT / RBAC Check</text>

  <!-- auth failure -->
  <rect class="box" x="700" y="430" width="240" height="90" fill="#ffe3e3" stroke="#e03131"/>
  <text x="820" y="475" class="label" text-anchor="middle">Auth Service</text>
  <text x="820" y="500" class="small" text-anchor="middle">Refresh / Re-login</text>

  <!-- core domain services -->
  <rect class="box" x="1040" y="140" width="240" height="90" fill="#f8f0fc" stroke="#9c36b5"/>
  <text x="1160" y="182" class="label" text-anchor="middle">Map &amp; POI Service</text>

  <rect class="box" x="1040" y="260" width="240" height="90" fill="#f8f0fc" stroke="#9c36b5"/>
  <text x="1160" y="302" class="label" text-anchor="middle">Events / Booking</text>

  <rect class="box" x="1040" y="380" width="240" height="90" fill="#f8f0fc" stroke="#9c36b5"/>
  <text x="1160" y="422" class="label" text-anchor="middle">Sailing Log Service</text>

  <!-- decision 2 -->
  <polygon points="1410,250 1510,315 1410,380 1310,315" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="3"/>
  <text x="1410" y="307" class="label" text-anchor="middle">Process OK?</text>
  <text x="1410" y="332" class="small" text-anchor="middle">Validation + Rules</text>

  <!-- data + outputs -->
  <rect class="box" x="1030" y="550" width="260" height="95" fill="#ebfbee" stroke="#2b8a3e"/>
  <text x="1160" y="593" class="label" text-anchor="middle">OLTP / Geo DB / Cache</text>
  <text x="1160" y="620" class="small" text-anchor="middle">Persist Route/Booking/Payment</text>

  <rect class="box" x="1360" y="550" width="190" height="95" fill="#e7f5ff" stroke="#1c7ed6"/>
  <text x="1455" y="593" class="label" text-anchor="middle">Client Response</text>
  <text x="1455" y="620" class="small" text-anchor="middle">Success + Notification</text>

  <rect class="box" x="1320" y="770" width="250" height="95" fill="#fff9db" stroke="#e67700"/>
  <text x="1445" y="812" class="label" text-anchor="middle">Retry Queue / DLQ</text>
  <text x="1445" y="840" class="small" text-anchor="middle">Backoff + Alert + Replay</text>

  <!-- base flow -->
  <path class="line" d="M320 258 L390 258"/>
  <path class="line" d="M650 258 L700 260"/>
  <path class="yes" d="M940 260 L1040 185"/>
  <path class="yes" d="M940 260 L1040 305"/>
  <path class="yes" d="M940 260 L1040 425"/>

  <path class="line" d="M1280 185 L1310 285"/>
  <path class="line" d="M1280 305 L1310 315"/>
  <path class="line" d="M1280 425 L1310 345"/>

  <!-- decision branches -->
  <path class="yes" d="M1410 380 L1410 550 L1290 595"/>
  <text x="1428" y="488" class="yesText">YES</text>

  <path class="no" d="M1310 315 L950 315 L820 430"/>
  <text x="1115" y="302" class="noText">NO</text>

  <!-- auth fail to retry -->
  <path class="no" d="M820 520 L820 818 L1320 818"/>
  <text x="1035" y="804" class="noText">NO (AUTH/VALIDATION FAIL)</text>

  <!-- success delivery -->
  <path class="yes" d="M1290 595 L1360 595"/>

  <!-- retry loop -->
  <path class="retry" d="M1445 770 L1445 700 L1160 700 L1160 645"/>
  <text x="1235" y="688" class="retryText">Retry Loop (Backoff)</text>

  <path class="retry" d="M1320 818 L970 818 L970 260 L1040 260"/>
  <text x="990" y="797" class="retryText">Replay to Services</text>

  <!-- legends -->
  <rect x="70" y="890" width="1460" height="70" rx="12" ry="12" fill="#ffffff" stroke="#ced4da"/>
  <text x="100" y="930" class="yesText">Green YES branch = proceed/success</text>
  <text x="520" y="930" class="noText">Red NO branch = fail path</text>
  <text x="860" y="930" class="retryText">Orange dashed = automatic retry loop</text>
  <text x="1230" y="930" class="small">Diamond = decision node</text>
</svg>
